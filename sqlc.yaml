# sqlc 配置文件，需在项目根目录执行: sqlc generate
# 详见 https://docs.sqlc.dev/en/latest/reference/config.html

version: "2"

sql:
  - engine: "mysql"
    schema: "internal/dal/schema"
    queries: "internal/dal/sql"
    gen:
      go:
        package: "dal"
        out: "internal/dal/queries"
        sql_package: "database/sql"
        sql_driver: "github.com/go-sql-driver/mysql"
        emit_interface: true
        emit_json_tags: true
        emit_prepared_queries: false
        emit_exact_table_names: false
        emit_empty_slices: true
        query_parameter_limit: 0
        overrides:
          - db_type: "json"
            go_type:
              import: "gorm.io/datatypes"
              package: "datatypes"
              type: "JSON"
