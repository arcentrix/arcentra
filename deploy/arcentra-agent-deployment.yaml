apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcentra-agent
  labels:
    app: arcentra-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arcentra-agent
  template:
    metadata:
      labels:
        app: arcentra-agent
    spec:
      containers:
      - name: arcentra-agent
        image: arcentrix/arcentra-agent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
          name: http
        - containerPort: 8084
          name: metrics
        - containerPort: 8085
          name: pprof
        - containerPort: 8086
          name: grpc
        volumeMounts:
        - name: config
          mountPath: /conf.d
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: arcentra-agent-config
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: arcentra-agent
  labels:
    app: arcentra-agent
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http
  - port: 8084
    targetPort: 8084
    protocol: TCP
    name: metrics
  - port: 8086
    targetPort: 8086
    protocol: TCP
    name: grpc
  selector:
    app: arcentra-agent

